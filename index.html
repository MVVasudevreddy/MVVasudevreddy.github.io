*{margin:0;padding:0;box-sizing:border-box;}
:root{--primary:#0f172a;--accent:#6366f1;--accent2:#06b6d4;--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--border:#334155;}
html{scroll-behavior:smooth;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}
a{color:var(--accent);text-decoration:none;}
a:hover{color:var(--accent2);}

/* NAV */
nav{position:fixed;top:0;width:100%;background:rgba(15,23,42,0.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);z-index:1000;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;}
.nav-logo{font-size:1.2rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links a{color:var(--muted);font-size:0.9rem;font-weight:500;transition:color 0.3s;}
.nav-links a:hover{color:var(--accent2);}

/* HERO */
#hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:6rem 2rem 4rem;background:radial-gradient(ellipse at 50% 50%,rgba(99,102,241,0.15) 0%,transparent 70%);}
.hero-content h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:800;line-height:1.2;margin-bottom:0.5rem;}
.hero-content h1 span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero-subtitle{font-size:clamp(1rem,2.5vw,1.3rem);color:var(--accent2);font-weight:600;margin-bottom:1rem;}
.hero-desc{color:var(--muted);max-width:600px;margin:0 auto 2rem;font-size:1rem;}
.hero-btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:2.5rem;}
.btn{padding:0.75rem 1.75rem;border-radius:8px;font-weight:600;font-size:0.95rem;transition:all 0.3s;cursor:pointer;border:none;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(99,102,241,0.4);color:#fff;}
.btn-outline{border:2px solid var(--accent);color:var(--accent);background:transparent;}
.btn-outline:hover{background:var(--accent);color:#fff;transform:translateY(-2px);}
.hero-contacts{display:flex;gap:1.5rem;justify-content:center;flex-wrap:wrap;}
.contact-chip{display:flex;align-items:center;gap:0.5rem;color:var(--muted);font-size:0.9rem;background:var(--card);padding:0.5rem 1rem;border-radius:50px;border:1px solid var(--border);transition:all 0.3s;}
.contact-chip:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px);}
.contact-chip i{color:var(--accent2);}

/* SECTIONS */
section{padding:5rem 2rem;max-width:1100px;margin:0 auto;}
.section-title{font-size:1.8rem;font-weight:700;margin-bottom:0.5rem;}
.section-title span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.section-line{width:60px;height:4px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:2px;margin-bottom:2.5rem;}

/* ABOUT */
#about .about-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:center;}
.about-text p{color:var(--muted);margin-bottom:1rem;line-height:1.8;}
.about-stats{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;text-align:center;transition:all 0.3s;}
.stat-card:hover{border-color:var(--accent);transform:translateY(-4px);}
.stat-num{font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.stat-label{color:var(--muted);font-size:0.85rem;}

/* SKILLS */
#skills{background:rgba(30,41,59,0.4);}
#skills .inner{max-width:1100px;margin:0 auto;padding:5rem 2rem;}
.skills-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem;}
.skill-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;transition:all 0.3s;}
.skill-card:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:0 8px 30px rgba(99,102,241,0.15);}
.skill-card h3{font-size:1rem;font-weight:600;margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem;}
.skill-card h3 i{color:var(--accent2);}

.tag{background:rgba(99,102,241,0.15);color:var(--accent2);padding:0.3rem 0.75rem;border-radius:50px;font-size:0.8rem;font-weight:500;border:1px solid rgba(99,102,241,0.3);}

/* EXPERIENCE */
.timeline{position:relative;padding-left:2rem;}
.timeline::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(var(--accent),var(--accent2));}
.timeline-item{position:relative;margin-bottom:2.5rem;}
.timeline-dot{position:absolute;left:-2.4rem;top:0.3rem;width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 0 0 4px rgba(99,102,241,0.2);}
.timeline-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;transition:all 0.3s;}
.timeline-card:hover{border-color:var(--accent);box-shadow:0 8px 30px rgba(99,102,241,0.1);}
.timeline-card h3{font-size:1.1rem;font-weight:700;margin-bottom:0.25rem;}
.timeline-meta{display:flex;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;}
.meta-badge{background:rgba(6,182,212,0.15);color:var(--accent2);padding:0.2rem 0.75rem;border-radius:50px;font-size:0.8rem;font-weight:500;}
.timeline-card ul{list-style:none;padding:0;}
.timeline-card ul li{color:var(--muted);font-size:0.9rem;padding:0.3rem 0;padding-left:1.2rem;position:relative;}
.timeline-card ul li::before{content:'▹';position:absolute;left:0;color:var(--accent2);}

/* PROJECTS */
.projects-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:1.5rem;}
.project-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.75rem;transition:all 0.3s;display:flex;flex-direction:column;}
.project-card:hover{border-color:var(--accent);transform:translateY(-6px);box-shadow:0 12px 40px rgba(99,102,241,0.2);}
.project-icon{font-size:2rem;margin-bottom:1rem;}
.project-card h3{font-size:1.1rem;font-weight:700;margin-bottom:0.5rem;}
.project-card p{color:var(--muted);font-size:0.9rem;line-height:1.7;flex:1;margin-bottom:1rem;}
.project-badge{display:inline-block;background:rgba(99,102,241,0.2);color:var(--accent);padding:0.2rem 0.6rem;border-radius:4px;font-size:0.75rem;font-weight:600;margin-bottom:0.75rem;}
.project-tech{display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:1.25rem;}
.project-links{display:flex;gap:0.75rem;}
.proj-link{display:flex;align-items:center;gap:0.4rem;font-size:0.85rem;font-weight:600;padding:0.4rem 0.9rem;border-radius:6px;border:1px solid var(--border);color:var(--muted);transition:all 0.3s;}
.proj-link:hover{border-color:var(--accent2);color:var(--accent2);background:rgba(6,182,212,0.1);}

/* EDUCATION */
.edu-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem;}
.edu-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;transition:all 0.3s;}
.edu-card:hover{border-color:var(--accent);transform:translateY(-4px);}
.edu-card .edu-icon{font-size:2rem;margin-bottom:0.75rem;}
.edu-card h3{font-size:1rem;font-weight:700;margin-bottom:0.25rem;}
.edu-card .edu-school{color:var(--accent2);font-size:0.9rem;font-weight:600;margin-bottom:0.25rem;}
.edu-card .edu-meta{color:var(--muted);font-size:0.85rem;}
.edu-card .edu-grade{margin-top:0.5rem;font-size:0.9rem;font-weight:700;color:var(--accent);}

/* CONTACT */
#contact{background:rgba(30,41,59,0.4);}
#contact .inner{max-width:1100px;margin:0 auto;padding:5rem 2rem;}

.contact-info p{color:var(--muted);margin-bottom:2rem;}
.contact-links{display:flex;flex-direction:column;gap:1rem;}
.contact-link-item{display:flex;align-items:center;gap:1rem;padding:1rem 1.25rem;background:var(--card);border:1px solid var(--border);border-radius:10px;transition:all 0.3s;}

.contact-link-item i{font-size:1.25rem;color:var(--accent2);width:24px;text-align:center;}
.contact-link-item .link-label{font-size:0.8rem;color:var(--muted);}
.contact-link-item .link-val{font-size:0.95rem;font-weight:600;color:var(--text);}
.contact-link-item:hover .link-val{color:var(--accent2);}
